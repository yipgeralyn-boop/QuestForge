workflows:
  ios-app-store:
    name: QuestForge iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: App Store Connect API Key

    environment:
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Add iOS platform
        script: |
          npx cap add ios
          echo "=== iOS structure ==="
          find ios -maxdepth 3 -name "Podfile" || echo "No Podfile found"

      - name: Install CocoaPods
        script: |
          PODFILE=$(find ios -name "Podfile" | head -1)
          echo "Using Podfile at: $PODFILE"
          cd "$(dirname $PODFILE)" && pod install

      - name: Add privacy descriptions to Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'QuestForge uses your location to verify you have reached each stop.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'QuestForge uses your camera to take photos for challenges.'" "$PLIST"

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.geralyn.questforge \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
